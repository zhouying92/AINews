# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 (Web3 村长专用版)
#                     Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: false 
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台 (看宏观金融与国内情绪)
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"

# ===============================================================
# 3. 数据源 - RSS 订阅 (Web3 核心情报站)
# ===============================================================
rss:
  enabled: true
  max_age_days: 2
  
  feeds:
    # --- 第一部分：AI & 前沿科技 ---
    - id: "openai-blog"
      url: "https://openai.com/blog/rss.xml"
      category: "tech"
      name: "OpenAI 官方博客"
    - id: "huggingface"
      url: "https://huggingface.co/blog/feed.xml"
      category: "tech"
      name: "Hugging Face"

    # --- 第二部分：区块链 & Crypto ---
      name: "CoinDesk"
    - id: "cointelegraph"
      url: "https://cointelegraph.com/rss"
      category: "crypto"
      name: "CoinTelegraph"
    - id: "the-block"
      url: "https://www.theblock.co/rss.xml"
      category: "crypto"
      name: "The Block"
    - id: "messari"
      url: "https://messari.io/rss"
      category: "crypto"
      name: "Messari"

    # --- 第三部分：互联网 & 工具创业 ---
    - id: "techcrunch"
      url: "https://techcrunch.com/feed/"
      category: "tech"
      name: "TechCrunch"
    - id: "hacker-news"
      url: "https://hnrss.org/frontpage"
      category: "tech"
      name: "Hacker News"
    - id: "product-hunt"
      url: "https://www.producthunt.com/feed"
      category: "tech"
      name: "Product Hunt"

    # --- 👨‍🌾 村长私人领地 ---
    - id: "cunzhang-blog"
      name: "村长博客"
      url: "https://www.cunzhangblog.com/rss/feed.xml"
      category: "personal"

# ===============================================================
# 4. 报告模式与展示
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false

display:
  title: "Web3 村长情报局"
  subtitle: "AI 每日精选：科技前沿与加密趋势"
  region_order:
    - standalone
    - ai_analysis
    - hotlist
    - rss
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true
    ai_analysis: true
  standalone:
    # 这里是重头戏：确保你的博客和几个核心源会被 AI 重点照顾
    rss_feeds: ["cunzhang-blog", "openai-blog", "the-block"]
    max_items: 15

# ===============================================================
# 5. 策略设置 (AI、筛选、存储)
# ===============================================================
filter:
  method: "ai"
  priority_sort_enabled: true

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  timeout: 120
  temperature: 1.0

ai_analysis:
  enabled: true
  language: "Chinese"
  include_rss: true
  include_standalone: true

ai_translation:
  enabled: true
  language: "中文"
  scope:
    rss: true
    standalone: true

storage:
  backend: "remote"
  formats:
    sqlite: true
    html: true
  local:
    data_dir: "output"

# ===============================================================
# 6. 其他高级设置
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""  

advanced:
  debug: false
  rss:
    timeout: 15
